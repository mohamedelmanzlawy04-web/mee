<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary -->
    <title>STRESSNES — Escape The Ordinary</title>
    <meta name="description" content="STRESSNES — luxury fashion that demands attention. New arrivals, curated collections, and premium pieces for those who dress with purpose." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="STRESSNES — Escape The Ordinary" />
    <meta property="og:description" content="Luxury fashion that demands attention. Shop the STRESSNES collection." />
    <meta property="og:image"       content="/images/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="STRESSNES wordmark" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="STRESSNES — Escape The Ordinary" />
    <meta name="twitter:description" content="Luxury fashion that demands attention. Shop the STRESSNES collection." />
    <meta name="twitter:image"       content="/images/og-image.jpg" />

    <!-- Favicon — compass-star SVG (crisp at any size) -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon"   type="image/png"     href="/images/stressnes-mark.png" sizes="512x512" />
    <link rel="apple-touch-icon" sizes="512x512"      href="/images/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Preload critical brand assets (no layout shift) -->
    <link rel="preload" as="image" href="/images/stressnes-wordmark.png" />

    <!-- Preload hero video — browser starts fetching before JS runs -->
    <link rel="preload" as="video" href="/images/hero-bg.mp4" type="video/mp4" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
