components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Auth ───────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
        phone:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthUser:
      type: object
      required: [id, email, fullName, role]
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
        avatar:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        token:
          type: string

    # ── Products ───────────────────────────────────────────────
    ProductImage:
      type: object
      required: [id, url]
      properties:
        id:
          type: string
        url:
          type: string
        altText:
          type: ["string", "null"]
        isPrimary:
          type: boolean
        sortOrder:
          type: integer

    ProductVariant:
      type: object
      required: [id, sku, isActive]
      properties:
        id:
          type: string
        sku:
          type: string
        size:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        material:
          type: ["string", "null"]
        priceOverride:
          type: ["number", "null"]
        isActive:
          type: boolean
        stockQty:
          type: integer

    ProductCategoryRef:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string

    Product:
      type: object
      required: [id, title, slug, sku, price, status]
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        sku:
          type: string
        description:
          type: ["string", "null"]
        shortDescription:
          type: ["string", "null"]
        price:
          type: number
        comparePrice:
          type: ["number", "null"]
        status:
          type: string
        featured:
          type: boolean
        published:
          type: boolean
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        category:
          oneOf:
            - $ref: "#/components/schemas/ProductCategoryRef"
            - type: "null"
        collection:
          oneOf:
            - $ref: "#/components/schemas/ProductCategoryRef"
            - type: "null"
        createdAt:
          type: string
          format: date-time

    PaginatedProductList:
      type: object
      required: [data, total, page, pageSize, totalPages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    ProductInput:
      type: object
      required: [title, sku, price]
      properties:
        title:
          type: string
        slug:
          type: string
        sku:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        price:
          type: number
        comparePrice:
          type: number
        costPrice:
          type: number
        status:
          type: string
          enum: [DRAFT, ACTIVE, ARCHIVED]
        featured:
          type: boolean
        published:
          type: boolean
        categoryId:
          type: string
        collectionId:
          type: string
        tagIds:
          type: array
          items:
            type: string

    ProductUpdate:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        price:
          type: number
        comparePrice:
          type: number
        status:
          type: string
          enum: [DRAFT, ACTIVE, ARCHIVED]
        featured:
          type: boolean
        published:
          type: boolean
        categoryId:
          type: string
        collectionId:
          type: string

    # ── Categories ─────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, slug, isActive]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        image:
          type: ["string", "null"]
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        image:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        image:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    # ── Collections ────────────────────────────────────────────
    Collection:
      type: object
      required: [id, name, slug, isActive]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        image:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CollectionInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        image:
          type: string
        isActive:
          type: boolean

    CollectionUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        image:
          type: string
        isActive:
          type: boolean

    # ── Cart ───────────────────────────────────────────────────
    CartItem:
      type: object
      required: [id, productId, quantity, price]
      properties:
        id:
          type: string
        productId:
          type: string
        variantId:
          type: ["string", "null"]
        quantity:
          type: integer
        price:
          type: number
        product:
          $ref: "#/components/schemas/Product"

    Cart:
      type: object
      required: [id, items]
      properties:
        id:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
        variantId:
          type: string
        quantity:
          type: integer
          minimum: 1

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1

    # ── Orders ─────────────────────────────────────────────────
    OrderItem:
      type: object
      required: [id, productId, quantity, unitPrice, totalPrice]
      properties:
        id:
          type: string
        productId:
          type: string
        variantId:
          type: ["string", "null"]
        productTitle:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number

    Order:
      type: object
      required: [id, orderNumber, status, subtotal, total, createdAt]
      properties:
        id:
          type: string
        orderNumber:
          type: string
        status:
          type: string
        subtotal:
          type: number
        discountAmount:
          type: number
        taxAmount:
          type: number
        shippingCost:
          type: number
        total:
          type: number
        currency:
          type: string
        shippingAddress:
          type: object
        couponCode:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        paymentMethod:
          type: ["string", "null"]
        paymentStatus:
          type: ["string", "null"]
        paymentScreenshotUrl:
          type: ["string", "null"]
        paymentRejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PaginatedOrderList:
      type: object
      required: [data, total, page, pageSize, totalPages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    OrderInput:
      type: object
      required: [shippingAddress, paymentMethod]
      properties:
        shippingAddress:
          type: object
          required: [firstName, lastName, line1, city, country]
          properties:
            firstName:
              type: string
            lastName:
              type: string
            line1:
              type: string
            line2:
              type: string
            city:
              type: string
            state:
              type: string
            postalCode:
              type: string
            country:
              type: string
            phone:
              type: string
            email:
              type: string
        governorateId:
          type: string
        cityId:
          type: string
        shippingMethodId:
          type: string
        couponCode:
          type: string
        notes:
          type: string
        paymentMethod:
          type: string
          enum: [COD, INSTAPAY, EWALLET]
        paymentScreenshotUrl:
          type: string

    OrderStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [PENDING, PAID, PROCESSING, PACKED, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
        note:
          type: string

    # ── Customers ──────────────────────────────────────────────
    Customer:
      type: object
      required: [id, email, fullName, role, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
        avatar:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PaginatedCustomerList:
      type: object
      required: [data, total, page, pageSize, totalPages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    CustomerUpdate:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        avatar:
          type: string

    # ── Reviews ────────────────────────────────────────────────
    Review:
      type: object
      required: [id, productId, rating, status, createdAt]
      properties:
        id:
          type: string
        productId:
          type: string
        userId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    PaginatedReviewList:
      type: object
      required: [data, total, page, pageSize, totalPages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    ReviewInput:
      type: object
      required: [productId, rating]
      properties:
        productId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        body:
          type: string

    ReviewUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]

    # ── Wishlist ───────────────────────────────────────────────
    WishlistItem:
      type: object
      required: [id, productId, addedAt]
      properties:
        id:
          type: string
        productId:
          type: string
        addedAt:
          type: string
          format: date-time
        product:
          $ref: "#/components/schemas/Product"

    WishlistInput:
